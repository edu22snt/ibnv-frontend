<div class="header">
  <div>
    <h1>Listar endereços</h1>
  </div>
  <button
    mat-icon-button
    color="accent"
    (click)="new()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<div class="search-container">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Procurar</mat-label>

    <input
      matInput
      [(ngModel)]="searchItem"
      (keyup.enter)="searchByKeyword()"
      placeholder="Digite cliente, contrato, bem, parcela, pg..."
    />

    <button
      mat-icon-button
      matSuffix
      color="primary"
      (click)="searchByKeyword()">
      <mat-icon>search</mat-icon>
    </button>

    @if (searchItem) {
      <button
        mat-icon-button
        matSuffix
        (click)="searchItem = ''; searchByKeyword()">
        <mat-icon>close</mat-icon>
      </button>
    }
    
  </mat-form-field>
  
</div>

<div id="relatorio">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">

    <ng-container matColumnDef="descricao">
      <th mat-header-cell *matHeaderCellDef> Descrição </th>
      <td mat-cell *matCellDef="let element"> {{ element.descricao }} </td>
    </ng-container>

    <ng-container matColumnDef="logradouro">
      <th mat-header-cell *matHeaderCellDef> Logradouro </th>
      <td mat-cell *matCellDef="let element"> {{ element.logradouro }} </td>
    </ng-container>

    <ng-container matColumnDef="complemento">
      <th mat-header-cell *matHeaderCellDef> Complemento </th>
      <td mat-cell *matCellDef="let element"> {{ element.complemento }} </td>
    </ng-container>

    <ng-container matColumnDef="bairro">
      <th mat-header-cell *matHeaderCellDef> Bairro </th>
      <td mat-cell *matCellDef="let element"> {{ element.bairro }} </td>
    </ng-container>

    <ng-container matColumnDef="cidade">
      <th mat-header-cell *matHeaderCellDef> Cidade </th>
      <td mat-cell *matCellDef="let element"> {{ element.cidade }} </td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let element"> {{ element.estado }} </td>
    </ng-container>

    <ng-container matColumnDef="cep">
      <th mat-header-cell *matHeaderCellDef> CEP </th>
      <td mat-cell *matCellDef="let element"> {{ element.cep }} </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th	mat-header-cell *matHeaderCellDef class="acoes-header"> Ações	</th>
      <td	mat-cell *matCellDef="let	element" class="acoes-cell">

        <button	mat-icon-button color="primary" [routerLink]="['/endereco-form/view',	element.id]">
          <mat-icon>visibility</mat-icon>
        </button>

        <button	mat-icon-button color="accent" [routerLink]="['/endereco-form/edit',	element.id]">
          <mat-icon>edit</mat-icon>
        </button>

        <button	mat-icon-button color="warn" (click)="confirmDelete(element.id)">
          <mat-icon>delete</mat-icon>
        </button>

      </td>
    </ng-container>

    <tr	mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr	mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<mat-paginator
  [length]="totalElements"
  [pageSize]="pageSize"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPageChange($event)">
</mat-paginator>
