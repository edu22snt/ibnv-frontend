<div class="header">
  <div>
    <h1>Listar Usuários</h1>
  </div>
  <button
    mat-icon-button
    color="accent"
    (click)="new()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<div class="search-container">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Procurar</mat-label>

    <input
      matInput
      [(ngModel)]="searchItem"
      (keyup.enter)="searchByKeyword()"
      placeholder="Digite o nome do usuário."
    />

    <button
      mat-icon-button
      matSuffix
      color="primary"
      (click)="searchByKeyword()">
      <mat-icon>search</mat-icon>
    </button>

    @if (searchItem) {
      <button
        mat-icon-button
        matSuffix
        (click)="searchItem = ''; searchByKeyword()">
        <mat-icon>close</mat-icon>
      </button>
    }

  </mat-form-field>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">

  <!-- ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let element"> {{ element.id }} </td>
  </ng-container>

  <!-- Usuário -->
  <ng-container matColumnDef="username">
    <th mat-header-cell *matHeaderCellDef> Usuário </th>
    <td mat-cell *matCellDef="let element"> {{ element.username }} </td>
  </ng-container>

  <!-- Roles -->
  <ng-container matColumnDef="roles">
    <th mat-header-cell *matHeaderCellDef> Roles </th>
    <td mat-cell *matCellDef="let element">
    <mat-chip-set>
        <mat-chip>
            @for (item of element.roles; track $index; let isLast = $last) {
                {{ item.replace('ROLE_', '') }}
                @if (!isLast) {, }
            }
        </mat-chip>
    </mat-chip-set>
    </td>
  </ng-container>


    <!-- Ação -->
  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef class="acoes-header"> Ações </th>
    <td mat-cell *matCellDef="let element" class="acoes-cell">

      <button mat-icon-button color="primary"  [routerLink]="['/usuario-form/view', element.id]">
        <mat-icon>visibility</mat-icon>
      </button>

      <button mat-icon-button color="accent" [routerLink]="['/usuario-form/edit', element.id]">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="confirmDelete(element)">
        <mat-icon>delete</mat-icon>
      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator
  [length]="totalElements"
  [pageSize]="pageSize"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPageChange($event)">
</mat-paginator>
